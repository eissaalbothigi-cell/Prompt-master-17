name: Prompt Master Auto Merger

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: git clone https://github.com/eissaalbothigi-cell/prompt-_master-engine.git engine || true
      - run: git clone https://github.com/eissaalbothigi-cell/Prompet-Master-17.git old1 || true
      - run: git clone https://github.com/eissaalbothigi-cell/Prompet--Master--17.git old2 || true

      - run: rm -rf engine/.git old1/.git old2/.git || true

      - run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add .
          git commit -m "Merged repositories" || true
          git push || true

          
