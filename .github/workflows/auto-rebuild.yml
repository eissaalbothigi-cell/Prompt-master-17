- name: Clone repositories
  run: |
    clone_with_retry() {
      local url=$1
      local target=$2
      local attempts=3
      local count=1
      while [ $count -le $attempts ]; do
        if git clone --depth 1 --single-branch "$url" "$target" 2>/dev/null; then
          echo "Cloned: ${url##*/}"
          return 0
        fi
        echo "Retry $count/$attempts: ${url##*/}"
        count=$((count + 1))
        sleep 3
      done
      echo "Failed: ${url##*/}"
      return 1
    }
    clone_with_retry "https://github.com/eissaalbothigi-cell/Prompet-Master-17.git" "old1"
    clone_with_retry "https://github.com/eissaalbothigi-cell/Prompet--Master--17.git" "old2"

- name: Remove git metadata from cloned repos
  run: |
    if [ -d "old1" ]; then rm -rf old1/.git 2>/dev/null || true; fi
    if [ -d "old2" ]; then rm -rf old2/.git 2>/dev/null || true; fi
    find . -name ".DS_Store" -delete 2>/dev/null || true
    find . -name "Thumbs.db" -delete 2>/dev/null || true

- name: Merge repositories
  run: |
    if [ -d "old1" ]; then
      rsync -av --ignore-existing old1/ . 2>/dev/null || true
      echo "Merged old1"
    fi
    if [ -d "old2" ]; then
      rsync -av --ignore-existing old2/ . 2>/dev/null || true
      echo "Merged old2"
    fi          if [ ! -f package.json ]; then
          cat > package.json <<EOF
          {
            "name":"prompt-master-17",
            "private":true,
            "version":"1.0.0",
            "type":"module",
            "scripts":{
              "dev":"vite",
              "build":"vite build",
              "preview":"vite preview"
            },
            "dependencies":{},
            "devDependencies":{}
          }
          EOF
          fi

      - name: Install
        run: npm install || true

      - name: Build
        run: npm run build || echo "No build configured"

      - name: Report
        run: |
          echo "# Prompt Master Report" > MERGE_REPORT.md
          echo "Date: $(date)" >> MERGE_REPORT.md
          echo "Files: $(find . -type f | wc -l)" >> MERGE_REPORT.md

      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add .
          git diff --cached --quiet && exit 0
          git commit -m "Auto rebuild [skip ci]"

      - name: Push
        run: |
          git pull --rebase origin main || true
          git push origin HEAD:main

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: prompt-master-report
          path: |
            MERGE_REPORT.md
            package.json
