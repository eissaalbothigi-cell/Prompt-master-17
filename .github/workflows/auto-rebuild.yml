name: Prompt Master Auto Rebuilder

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clean
        run: |
          rm -rf old1 old2 archive engine temp_* || true
          rm -f MERGE_REPORT.md DUPLICATES_REPORT.md || true

      - name: Clone Sources
        run: |
          git clone --depth=1 https://github.com/eissaalbothigi-cell/Prompt-master-17.git old1 || true

      - name: Merge Files
        run: |
          rsync -a old1/ ./ --exclude=.git || true

      - name: Ensure package.json
        run: |
          if [ ! -f package.json ]; then
          cat > package.json <<EOF
          {
            "name":"prompt-master-17",
            "private":true,
            "version":"1.0.0",
            "type":"module",
            "scripts":{
              "dev":"vite",
              "build":"vite build",
              "preview":"vite preview"
            },
            "dependencies":{},
            "devDependencies":{}
          }
          EOF
          fi

      - name: Install
        run: npm install || true

      - name: Build
        run: npm run build || echo "No build configured"

      - name: Report
        run: |
          echo "# Prompt Master Report" > MERGE_REPORT.md
          echo "Date: $(date)" >> MERGE_REPORT.md
          echo "Files: $(find . -type f | wc -l)" >> MERGE_REPORT.md

      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add .
          git diff --cached --quiet && exit 0
          git commit -m "Auto rebuild [skip ci]"

      - name: Push
        run: |
          git pull --rebase origin main || true
          git push origin HEAD:main

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: prompt-master-report
          path: |
            MERGE_REPORT.md
            package.json
