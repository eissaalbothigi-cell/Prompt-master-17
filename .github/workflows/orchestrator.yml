# ====================================================================
# Prompt Master Auto Rebuilder - Production Grade v10.0 (FINAL)
# ====================================================================

name: Prompt Master Auto Rebuilder

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clean workspace
        run: |
          rm -rf engine archive old1 old2 temp_* 2>/dev/null || true
          rm -f MERGE_REPORT.md package.json.bak 2>/dev/null || true
          find . -name ".DS_Store" -delete 2>/dev/null || true
          find . -name "Thumbs.db" -delete 2>/dev/null || true

      - name: Create directory structure
        run: |
          mkdir -p archive/v1 archive/v2

      - name: Clone repositories
        run: |
          clone_with_retry() {
            local url=$1
            local target=$2
            local attempts=3
            local count=1
            while [ $count -le $attempts ]; do
              if git clone --depth 1 --single-branch "$url" "$target" 2>/dev/null; then
                echo "Cloned: ${url##*/}"
                return 0
              fi
              echo "Retry $count/$attempts: ${url##*/}"
              count=$((count + 1))
              sleep 3
            done
            echo "Failed: ${url##*/}"
            return 1
          }
          clone_with_retry "https://github.com/eissaalbothigi-cell/Prompet-Master-17.git" "old1"
          clone_with_retry "https://github.com/eissaalbothigi-cell/Prompet--Master--17.git" "old2"

      - name: Remove git metadata from cloned repos
        run: |
          if [ -d "old1" ]; then rm -rf old1/.git 2>/dev/null || true; fi
          if [ -d "old2" ]; then rm -rf old2/.git 2>/dev/null || true; fi

      - name: Merge repositories
        run: |
          if [ -d "old1" ]; then
            rsync -av --ignore-existing old1/ . 2>/dev/null || true
            echo "Merged old1"
          fi
          if [ -d "old2" ]; then
            rsync -av --ignore-existing old2/ . 2>/dev/null || true
            echo "Merged old2"
          fi

      - name: Create Vite React project if empty
        run: |
          if [ ! -f "package.json" ]; then
            cat > package.json << 'EOF'
          {
            "name": "prompt-master-17",
            "private": true,
            "version": "0.0.0",
            "type": "module",
            "scripts": {
              "dev": "vite",
              "build": "vite build",
              "preview": "vite preview"
            },
            "dependencies": {
              "react": "^18.2.0",
              "react-dom": "^18.2.0"
            },
            "devDependencies": {
              "@types/react": "^18.2.43",
              "@types/react-dom": "^18.2.17",
              "@vitejs/plugin-react": "^4.2.1",
              "vite": "^5.0.8"
            }
          }
          EOF
          fi
          if [ ! -f "vite.config.js" ]; then
            cat > vite.config.js << 'EOF'
          import { defineConfig } from 'vite'
          import react from '@vitejs/plugin-react'
          export default defineConfig({
            plugins: [react()],
            server: { port: 3000, open: true },
            build: { outDir: 'dist', sourcemap: true }
          })
          EOF
          fi
          if [ ! -f "index.html" ]; then
            cat > index.html << 'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Prompt Master 17</title>
            </head>
            <body>
              <div id="root"></div>
              <script type="module" src="/src/main.jsx"></script>
            </body>
          </html>
          EOF
          fi
          if [ ! -d "src" ]; then
            mkdir -p src
            cat > src/main.jsx << 'EOF'
          import React from 'react'
          import ReactDOM from 'react-dom/client'
          import App from './App.jsx'
          import './index.css'
          ReactDOM.createRoot(document.getElementById('root')).render(
            <React.StrictMode>
              <App />
            </React.StrictMode>
          )
          EOF
            cat > src/App.jsx << 'EOF'
          import React from 'react'
          import './App.css'
          function App() {
            return (
              <div className="app">
                <h1>Prompt Master 17</h1>
                <p>AI Prompt Engineering Platform</p>
              </div>
            )
          }
          export default App
          EOF
            echo "* { margin:0; padding:0; box-sizing:border-box; }
          body { font-family: -apple-system, sans-serif; background: #0a0a0a; color: #fff; }" > src/index.css
            echo ".app { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
          h1 { font-size:4rem; margin-bottom:1rem; text-shadow: 0 0 20px rgba(0,0,0,0.3); }
          p { font-size:1.5rem; opacity:0.9; }" > src/App.css
          fi

      - name: Install dependencies
        run: |
          if [ -f "package.json" ]; then
            npm install
          fi

      - name: Build application
        run: |
          if [ -f "package.json" ]; then
            if grep -q '"build":' package.json; then
              npm run build
            else
              echo "No build script found, skipping build"
            fi
          fi

      - name: Generate merge report
        run: |
          total_files=$(find . -type f -not -path "./.git/*" -not -path "./.github/*" -not -path "./node_modules/*" 2>/dev/null | wc -l)
          cat > MERGE_REPORT.md << EOF
          # Merge Report
          Date: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          Repository: ${{ github.repository }}
          Branch: ${{ github.ref_name }}
          Total Files: $total_files
          Status: Success
          EOF

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Pull latest changes
        run: |
          git pull origin ${{ github.ref_name }} --rebase --autostash || true

      - name: Commit changes
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Auto-merge: Prompt Master 17 [skip ci]"

      - name: Push with retry
        run: |
          attempts=3
          count=1
          while [ $count -le $attempts ]; do
            if git push origin ${{ github.ref_name }} 2>/dev/null; then
              echo "Push successful"
              exit 0
            fi
            echo "Push failed, retry $count/$attempts"
            git pull origin ${{ github.ref_name }} --rebase || true
            count=$((count + 1))
            sleep 5
          done
          exit 1

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: prompt-master-build
          path: |
            dist/
            MERGE_REPORT.md
          retention-days: 7          if [ ! -f package.json ]; then
            cat > package.json <<EOF
          {
            "name":"prompt-master-17",
            "private":true,
            "version":"1.0.0",
            "scripts":{
              "build":"echo Build completed"
            }
          }
          EOF
          fi

      - name: Install Dependencies
        run: npm install || true

      - name: Build Application
        run: npm run build || true

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: prompt-master-build
          path: dist/
        continue-on-error: true

      - name: Commit Changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "PM17 orchestrator sync"
          git push
      - name: Verify Supabase
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "Supabase URL not configured - skipping"
            exit 0
          fi
          curl -f -H "apikey:${SUPABASE_KEY}" "${SUPABASE_URL}/rest/v1/" || echo "Supabase unavailable - continuing"

      - name: Ensure package.json
        run: |
          if [ ! -f package.json ]; then
          cat > package.json <<EOF
          {
            "name":"prompt-master-17",
            "private":true,
            "version":"1.0.0",
            "scripts":{
              "build":"echo Build completed"
            }
          }
          EOF
          fi

      - name: Install Dependencies
        run: npm install || true

      - name: Build Application
        run: npm run build || true

      - name: Commit Changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .
          git commit -m "PM17 orchestrator sync" || true
          git push || true            "name":"Prompt Master Engine",
            "version":"1.0.0",
            "provider":"Prompt Master 17",
            "supabase":true,
            "github":true,
            "status":"active"
          }
          EOF

      - name: Verify Supabase
        run: |
          curl \
          -H "apikey:${SUPABASE_KEY}" \
          ${SUPABASE_URL}/rest/v1/

      - name: Install Dependencies
        run: npm install

      - name: Build Application
        run: npm run build

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: prompt-master-build
          path: dist/

      - name: Commit Changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add .

          git commit -m "PM17 orchestrator sync" || echo "No changes"

          git push
